<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo AI | Prompt Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; color: white; margin: 0; padding-bottom: 50px; scroll-behavior: smooth; }
        
        /* Header Section */
        header { text-align: center; padding: 40px 20px; background: linear-gradient(to bottom, #1e293b, #0b1120); border-bottom: 1px solid #334155; }
        header h1 { margin: 0; font-size: 32px; color: #38bdf8; font-weight: 600; letter-spacing: 1px; }
        header p { color: #94a3b8; font-size: 14px; margin: 10px 0 20px 0; }
        
        .back-home { display: inline-flex; align-items: center; gap: 8px; color: #cbd5e1; text-decoration: none; font-size: 14px; padding: 10px 20px; border-radius: 20px; background: #0f172a; border: 1px solid #334155; transition: 0.3s; }
        .back-home:hover { background: #334155; color: #38bdf8; }

        /* Gallery Grid */
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        /* Image Card */
        .card { background: #1e293b; border-radius: 20px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        
        /* ছবি গোল এবং সঠিক সাইজ করার জন্য */
        .img-wrapper { width: 100%; height: 280px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }
        
        .card-content { padding: 18px; }
        .card-title { font-size: 17px; font-weight: 600; color: #f1f5f9; margin-bottom: 12px; }
        
        /* Prompt Box */
        .prompt-box { background: #0f172a; padding: 12px; border-radius: 12px; font-size: 13px; color: #94a3b8; position: relative; border: 1px solid #334155; max-height: 80px; overflow: hidden; }
        .prompt-box span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 50px; }
        
        .copy-btn { position: absolute; right: 5px; top: 5px; background: #38bdf8; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; color: #0b1120; font-weight: bold; font-size: 11px; transition: 0.2s; }
        .copy-btn:active { transform: scale(0.95); opacity: 0.8; }
        .copy-btn i { margin-right: 4px; }

    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-magic"></i> Anondo AI Prompt Gallery</h1>
    <p>A Premium Collection of Cinematic & Hyper-realistic AI Arts by Anondo Kumar Roy</p>
    <a href="https://anondo.bro.bd" class="back-home"><i class="fas fa-arrow-left"></i> Back to Main Hub</a>
</header>

<div class="container">
    {% for image in images %}
    <div class="card">
        <div class="img-wrapper">
            <img src="{{ url_for('static', filename='images/' + image.image_file) }}" alt="{{ image.title }}">
        </div>
        <div class="card-content">
            <div class="card-title">{{ image.title }}</div>
            <div class="prompt-box">
                <span id="{{ image.id }}">{{ image.prompt }}</span>
                <button class="copy-btn" onclick="copyPrompt('{{ image.id }}')"><i class="fas fa-copy"></i> Copy</button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    function copyPrompt(id) {
        const textElement = document.getElementById(id);
        const promptText = textElement.innerText;
        
        // ক্লিপবোর্ডে কপি করার লজিক
        navigator.clipboard.writeText(promptText).then(() => {
            // কপি করার পর বাটনের লেখা সাময়িকভাবে পরিবর্তন
            const btn = textElement.nextElementSibling;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            btn.style.background = '#10b981'; // সবুজ রঙ
            btn.style.color = 'white';
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                btn.style.background = '#38bdf8'; // আগের নীল রঙ
                btn.style.color = '#0b1120';
            }, 2000); // ২ সেকেন্ড পর আগের অবস্থায় ফিরে যাবে
        }).catch(err => {
            alert('Could not copy prompt. Please try manually.');
        });
    }
</script>

</body>
</html>
