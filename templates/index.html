<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Editor by Anondo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Consolas', monospace; background: #0b1120; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Top Heading */
        .top-header { 
            background: #1e293b; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid #38bdf8;
        }
        .top-header h1 { 
            color: #38bdf8; 
            font-size: 20px; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Desktop Mode Suggestion */
        #desktop-notice {
            background: #fef08a;
            color: #854d0e;
            padding: 8px;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            display: none; /* JS দিয়ে শুধু মোবাইলে দেখানো হবে */
        }

        /* Toolbar */
        .toolbar { 
            background: #0f172a; 
            padding: 10px; 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            border-bottom: 1px solid #334155; 
        }
        .toolbar button { 
            background: #334155; 
            color: #38bdf8; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer;
        }

        /* Editor & Preview Grid */
        .main-content { 
            display: flex; 
            flex: 1; 
            height: calc(100vh - 120px); 
        }

        /* Mobile Responsive: কলামে দেখাবে, ডেস্কটপে পাশাপাশি */
        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .editor-box, .preview-box { width: 100% !important; height: 50% !important; }
            #desktop-notice { display: block; }
        }

        .editor-box { width: 50%; height: 100%; position: relative; border-right: 1px solid #334155; }
        .preview-box { width: 50%; height: 100%; background: white; }

        #editing, #highlighting {
            padding: 15px; width: 100%; height: 100%;
            font-size: 14px; line-height: 1.5;
            position: absolute; top: 0; left: 0;
            white-space: pre; overflow: auto;
        }
        #editing { background: transparent; color: transparent; caret-color: white; z-index: 1; outline: none; border: none; resize: none; }
        #highlighting { z-index: 0; pointer-events: none; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="top-header">
    <h1>HTML Editor by Anondo</h1>
</div>

<div id="desktop-notice">
    <i class="fas fa-desktop"></i> Better performance er jonno Desktop Mode on koro!
</div>

<div class="toolbar">
    <button onclick="addCode('<')"><</button>
    <button onclick="addCode('>')">></button>
    <button onclick="addCode('/')">/</button>
    <button onclick="addCode('=')">=</button>
    <button onclick="addCode('&quot;')">"</button>
    <button onclick="addCode('!')">!</button>
    <button onclick="addCode('{')">{</button>
    <button onclick="addCode('}')">}</button>
    <button onclick="updateLive()">Run <i class="fas fa-play"></i></button>
</div>

<div class="main-content">
    <div class="editor-box">
        <textarea id="editing" spellcheck="false" oninput="updateLive()" onkeydown="handleTab(this, event)"></textarea>
        <pre id="highlighting" aria-hidden="true"><code class="language-html" id="highlight-content"></code></pre>
    </div>
    
    <div class="preview-box">
        <iframe id="live-preview"></iframe>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<script>
    const editArea = document.getElementById("editing");
    const highlightArea = document.getElementById("highlight-content");
    const previewFrame = document.getElementById("live-preview");

    function updateLive() {
        let code = editArea.value;

        // Auto Tag Closer
        if (code.endsWith(">") && !code.endsWith("/>")) {
            const pos = editArea.selectionStart;
            const match = code.substring(0, pos).match(/<([a-zA-Z1-6]+)>$/);
            if (match) {
                editArea.value = code + `</${match[1]}>`;
                editArea.selectionStart = editArea.selectionEnd = pos;
            }
        }

        // Highlight Update
        highlightArea.textContent = editArea.value;
        Prism.highlightElement(highlightArea);

        // Preview Update
        const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        doc.open();
        doc.write(editArea.value);
        doc.close();
    }

    function addCode(char) {
        const start = editArea.selectionStart;
        editArea.value = editArea.value.substring(0, start) + char + editArea.value.substring(editArea.selectionEnd);
        editArea.selectionStart = editArea.selectionEnd = start + char.length;
        editArea.focus();
        updateLive();
    }

    function handleTab(el, e) {
        if (e.key === "Tab") {
            e.preventDefault();
            addCode("  ");
        }
    }

    // Scroll Sync
    editArea.addEventListener("scroll", () => {
        document.getElementById("highlighting").scrollTop = editArea.scrollTop;
        document.getElementById("highlighting").scrollLeft = editArea.scrollLeft;
    });

    // Default Code
    editArea.value = "<html>\n<body>\n  <h1 style='color:blue;'>HTML Editor by Anondo</h1>\n  <p>Start coding now...</p>\n</body>\n</html>";
    updateLive();
</script>

</body>
</html>
