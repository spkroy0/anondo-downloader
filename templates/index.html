<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anondo Downloader Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 95%; max-width: 450px; border: 1px solid #38bdf8; box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2); text-align: center; }
        h2 { color: #38bdf8; margin-bottom: 5px; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #0ea5e9; transform: scale(1.02); }
        .footer { margin-top: 20px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚀 Anondo Pro</h2>
        <p style="font-size: 14px; color: #94a3b8; margin-bottom: 20px;">Stable Snaptube-style Downloader</p>
        <form action="/download" method="POST">
            <input type="text" name="url" placeholder="Paste YouTube/FB/Insta link..." required>
            <select name="format_type">
                <optgroup label="🎬 Video Quality">
                    <option value="1080">1080p Full HD</option>
                    <option value="720" selected>720p HD</option>
                    <option value="480">480p SD</option>
                    <option value="360">360p Low</option>
                    <option value="240">240p Quality</option>
                    <option value="144">144p Quality</option>
                </optgroup>
                <optgroup label="🎵 Music Quality">
                    <option value="320k">320kbps High Quality</option>
                    <option value="256k">256kbps Premium</option>
                    <option value="128k">128kbps Standard</option>
                    <option value="64k">64kbps Data Saver</option>
                </optgroup>
            </select>
            <button type="submit">Download Now</button>
        </form>
        <div class="footer">Powered by Anondo AI | Version 3.1</div>
    </div>
</body>
</html>
